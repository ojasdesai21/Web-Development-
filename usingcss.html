<!DOCTYPE html>
<html>
<head>
<title>Office Job Appointment Form</title>

<style>

body{
    background-color: #F7F5EB;
    font-family: Arial;
}

h2{
    text-align: center;
    color: darkblue;
}

table{
    background-color: #76A787;
    padding: 20px;
    border-radius: 10px;
}

input, select, textarea{
    width: 250px;
    padding: 5px;
    margin-top: 5px;
}

textarea{
    height:70px;
}

button{
    padding: 8px 15px;
    margin: 5px;
    background-color: darkblue;
    color: white;
    border: none;
    border-radius: 5px;
}

button:hover{
    background-color: navy;
}

</style>

</head>

<body>

<center>

<h2>Office Job Appointment Form</h2>

<form>

<table>

<tr>
<td>

Full Name:<br>
<input type="text" name="name"><br><br>

Email:<br>
<input type="email" name="email"><br><br>

Phone Number:<br>
<input type="tel" name="phone"><br><br>

Date of Birth:<br>
<input type="date" name="dob"><br><br>

Gender:<br>
  Male <input type="radio" name="gender">  <br>
 Female <input type="radio" name="gender"> <br> 
 Other <input type="radio" name="gender"> <br> 
<br><br>

Address:<br>
<textarea name="address"></textarea>
<br><br>

Highest Qualification:<br>
<select name="education">
<option>Bachelor Degree</option>
<option>Master Degree</option>
<option>Diploma</option>
<option>Other</option>
</select>
<br><br>

Work Experience (Years):<br>
<input type="number" name="experience"><br><br>

Skills:<br>
<input type="text" name="skills"><br><br>

Position Applying For:<br>
<select name="job">
<option>Software Developer</option>
<option>HR Executive</option>
<option>Accountant</option>
</select>

<br><br>

Upload Resume:<br>
<input type="file" name="resume">

<br><br>

<button type="submit">Submit</button>
<button type="reset">Reset</button>

</td>
</tr>

</table>

</form>

</center>

</body>
</html>
